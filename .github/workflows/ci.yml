name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck --exclude=SC2029 sandbox-reproducer sandbox-reproducer-setup

  test-jq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test jq expressions
        run: bash test/test-jq-expressions.sh
